<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>$BLISS — we all started here</title>
<meta name="description" content="The most seen image in history. Now it's a chart. $BLISS on Solana." />

<!-- Open Graph / Twitter card -->
<meta property="og:title" content="$BLISS — we all started here" />
<meta property="og:description" content="The most seen image in history. Now it's a chart." />
<meta property="og:type" content="website" />

<style>
  :root {
    --sky-top: #2e7bd6;
    --sky-bottom: #8fc4f0;
    --grass: #5aa02c;
    --grass-dark: #3f7d1d;
    --ink: #0d1b2a;
    --paper: #f4f8fc;
    --accent: #5aa02c;
    --pixel: 4px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--ink);
    background: var(--sky-top);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- pixel hill canvas fills the hero ---- */
  #scene {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  .wrap {
    position: relative;
    z-index: 2;
    min-height: 100%;
    display: flex;
    flex-direction: column;
  }

  /* ---- top bar ---- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 26px;
  }

  .brand {
    font-family: 'Press Start 2P', monospace;
    font-size: 15px;
    letter-spacing: 1px;
    color: #fff;
    text-shadow: 2px 2px 0 rgba(13,27,42,.35);
  }

  nav { display: flex; gap: 10px; }

  .pill {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    letter-spacing: .5px;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--ink);
    background: #fff;
    padding: 11px 13px;
    border: 0;
    border-radius: 0;
    image-rendering: pixelated;
    box-shadow: 0 0 0 3px var(--ink), 4px 4px 0 0 rgba(13,27,42,.4);
    transition: transform .08s steps(2), box-shadow .08s steps(2);
  }
  .pill:hover { transform: translate(2px,2px); box-shadow: 0 0 0 3px var(--ink), 2px 2px 0 0 rgba(13,27,42,.4); }
  .pill:active { transform: translate(4px,4px); box-shadow: 0 0 0 3px var(--ink); }
  .pill.solid { background: var(--ink); color: #fff; }

  /* ---- hero ---- */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 30px 20px 60px;
  }

  .ticker {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(34px, 9vw, 92px);
    color: #fff;
    line-height: 1;
    text-shadow: 4px 4px 0 rgba(13,27,42,.35);
    margin-bottom: 18px;
  }

  .tagline {
    font-size: clamp(15px, 2.4vw, 22px);
    font-weight: 500;
    color: #fff;
    text-shadow: 1px 1px 0 rgba(13,27,42,.35);
    margin-bottom: 30px;
  }

  .cta-row { display: flex; gap: 22px; margin-top: 30px; flex-wrap: wrap; justify-content: center; }
  .btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px; line-height: 1.2; letter-spacing: .5px;
    text-transform: uppercase; text-decoration: none; white-space: nowrap;
    padding: 16px 22px; border-radius: 0; cursor: pointer; border: 0;
    image-rendering: pixelated;
    transition: transform .08s steps(2), box-shadow .08s steps(2);
  }
  .btn.buy   { background: var(--grass); color: #fff; box-shadow: 0 0 0 3px var(--ink), 6px 6px 0 0 var(--ink); }
  .btn.ghost { background: #fff; color: var(--ink); box-shadow: 0 0 0 3px var(--ink), 6px 6px 0 0 var(--ink); }
  .btn:hover  { transform: translate(2px,2px); box-shadow: 0 0 0 3px var(--ink), 4px 4px 0 0 var(--ink); }
  .btn:active { transform: translate(6px,6px); box-shadow: 0 0 0 3px var(--ink); }

  /* ---- contract address ---- */
  .ca {
    margin-top: 22px;
    display: inline-flex; align-items: center; gap: 10px;
    background: rgba(13,27,42,.55);
    color: #d8e9f7;
    font-size: 12.5px; font-family: ui-monospace, 'SF Mono', monospace;
    padding: 9px 14px; border-radius: 10px;
    cursor: pointer; user-select: all;
    backdrop-filter: blur(4px);
    max-width: 92vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    transition: background .12s ease;
  }
  .ca:hover { background: rgba(13,27,42,.72); }
  .ca .copy { font-size: 11px; color: #9fd66a; font-weight: 600; white-space: nowrap; }

  /* ---- orientation badge above the logo ---- */
  .badge {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px; letter-spacing: .5px;
    color: #fff; background: rgba(13,27,42,.45);
    padding: 8px 12px; margin-bottom: 22px;
    box-shadow: 0 0 0 2px rgba(255,255,255,.25);
    backdrop-filter: blur(4px);
  }

  /* ---- XP taskbar ---- */
  .taskbar {
    position: fixed; bottom: 0; left: 0; right: 0; height: 40px; z-index: 6;
    display: flex; align-items: stretch; justify-content: space-between;
    background: linear-gradient(#3f8df0 0%, #2f78db 8%, #2566c6 100%);
    box-shadow: inset 0 2px 0 rgba(255,255,255,.4), inset 0 -2px 0 rgba(0,0,0,.18);
  }
  .start {
    display: flex; align-items: center; gap: 9px;
    padding: 0 26px 0 12px; text-decoration: none;
    background: linear-gradient(#74c044 0%, #4e9a2a 45%, #3c8020 100%);
    box-shadow: inset 0 2px 0 rgba(255,255,255,.45), inset -1px 0 0 rgba(0,0,0,.2);
    border-radius: 0 14px 14px 0;
    transition: filter .1s ease;
  }
  .start:hover { filter: brightness(1.08); }
  .start-label {
    font-family: Tahoma, Geneva, sans-serif;
    font-style: italic; font-weight: 700; font-size: 17px; color: #fff;
    text-shadow: 1px 1px 1px rgba(0,0,0,.45);
  }
  .flag {
    display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
    gap: 1.5px; width: 15px; height: 13px; transform: perspective(20px) rotateY(-12deg);
  }
  .flag i:nth-child(1) { background: #f25022; }
  .flag i:nth-child(2) { background: #7fba00; }
  .flag i:nth-child(3) { background: #00a4ef; }
  .flag i:nth-child(4) { background: #ffb900; }
  .tray {
    display: flex; align-items: center; gap: 14px;
    padding: 0 14px 0 18px; margin: 5px 0;
    box-shadow: inset 2px 0 0 rgba(0,0,0,.2), inset 3px 0 0 rgba(255,255,255,.15);
    background: linear-gradient(#1c9be0, #1378c4);
  }
  .tray-msg { color: rgba(255,255,255,.9); font-size: 12px; }
  .clock { color: #fff; font-size: 12px; font-weight: 600; }
  @media (max-width: 640px) { .tray-msg { display: none; } }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: #fff; padding: 11px 20px; border-radius: 10px;
    font-size: 13px; font-weight: 500; opacity: 0; pointer-events: none;
    transition: opacity .2s ease, transform .2s ease; z-index: 10;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <canvas id="scene"></canvas>

  <div class="wrap">
    <header>
      <div class="brand">$BLISS</div>
      <nav>
        <a class="pill" href="https://x.com" target="_blank" rel="noopener">Twitter</a>
        <a class="pill solid" id="buy-top" href="#" target="_blank" rel="noopener">Buy</a>
      </nav>
    </header>

    <main class="hero">
      <div class="badge">▸ Windows XP · the hill you grew up on</div>
      <h1 class="ticker">$BLISS</h1>
      <p class="tagline">we all started here.</p>

      <div class="cta-row">
        <a class="btn buy" id="buy-main" href="#" target="_blank" rel="noopener">Buy on pump.fun</a>
        <a class="btn ghost" href="#" id="chart" target="_blank" rel="noopener">Chart</a>
      </div>

      <div class="ca" id="ca" title="Click to copy">
        <span id="ca-text">contract: launching soon</span>
        <span class="copy">COPY</span>
      </div>
    </main>

  </div>

  <!-- XP taskbar: the second-most-recognizable XP element. Instant "oh, Windows XP". -->
  <div class="taskbar">
    <a class="start" id="buy-start" href="#" target="_blank" rel="noopener">
      <span class="flag"><i></i><i></i><i></i><i></i></span>
      <span class="start-label">start</span>
    </a>
    <div class="tray">
      <span class="tray-msg">the most seen image in history.</span>
      <span class="clock">4:20 PM</span>
    </div>
  </div>

  <div class="toast" id="toast">copied</div>

<script>
/* =========================================================
   CONFIG — fill these in at launch
   ========================================================= */
const CONFIG = {
  contract: "5XVCu84DuBniexxCMVM1QLQBoWPuVCmvr39Q9mFUpump",   // full mint address
  twitter:  "https://x.com/blisscoin_sol",   // your X profile
  pumpfun:  "https://pump.fun/coin/5XVCu84DuBniexxCMVM1QLQBoWPuVCmvr39Q9mFUpump",   // pump.fun coin url (also used for "Buy")
  chart:    "https://dexscreener.com/solana/5XVCu84DuBniexxCMVM1QLQBoWPuVCmvr39Q9mFUpump",   // chart button
  hillImage: "bliss.jpg",             // drop the real Bliss photo here; it gets pixelated live
  pixelSize: 200,                     // lower = chunkier pixels (recognizable ~160–240)
};

/* wire links */
(function wire(){
  const t = document.querySelector('.pill[href="https://x.com"]');
  if (CONFIG.twitter) t.href = CONFIG.twitter;
  const buyUrl = CONFIG.pumpfun || "#";
  document.getElementById('buy-top').href   = buyUrl;
  document.getElementById('buy-main').href  = buyUrl;
  document.getElementById('buy-start').href = buyUrl;
  document.getElementById('chart').href    = CONFIG.chart || buyUrl;
  if (CONFIG.contract) document.getElementById('ca-text').textContent = "contract: " + CONFIG.contract;
})();

/* copy contract */
const caEl = document.getElementById('ca');
const toast = document.getElementById('toast');
caEl.addEventListener('click', async () => {
  if (!CONFIG.contract) return;
  try { await navigator.clipboard.writeText(CONFIG.contract); } catch(e){}
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1300);
});

/* =========================================================
   PIXEL HILL — drawn procedurally, no image assets.
   Renders at low res then scales up crisp ("pixelated").
   ========================================================= */
const canvas = document.getElementById('scene');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;   // keep the upscale crunchy

// virtual low-res grid (the "pixel" resolution of the scene)
const VW = CONFIG.pixelSize || 200;  // virtual pixels wide
let VH = 135;                        // virtual pixels tall (set per aspect)
let hillImg = null;                  // the real Bliss photo, once loaded

// crop-to-cover the low-res canvas, then CSS upscales it crunchy = pixelated photo
function drawPixelImage(img) {
  const ir = img.naturalWidth / img.naturalHeight, cr = VW / VH;
  let sx, sy, sw, sh;
  if (ir > cr) { sh = img.naturalHeight; sw = sh * cr; sx = (img.naturalWidth - sw)/2; sy = 0; }
  else         { sw = img.naturalWidth;  sh = sw / cr; sx = 0; sy = (img.naturalHeight - sh)/2; }
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(img, sx, sy, sw, sh, 0, 0, VW, VH);
}

// a tiny deterministic RNG so clouds/texture are stable across redraws
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

// cloud layout: [xFrac, yFrac, widthPx] — soft, flat-bottomed cumulus across the sky
const CLOUDS = [
  [0.13, 0.18, 34],
  [0.39, 0.11, 26],
  [0.62, 0.22, 40],
  [0.84, 0.14, 30],
  [0.98, 0.33, 22],
];

let bg = null;        // cached static sky + hill (offscreen)
let sprites = [];     // pre-rendered cloud blobs
let imgDrawn = false; // photo path: drawn once

// soft cumulus: union of overlapping semicircles on a flat baseline -> fluffy rounded top
function makeCloudSprite(width) {
  const W = Math.round(width);
  // [centerFrac, radiusFrac] bumps; centers sit on the baseline -> domed top, flat bottom
  const circles = [[0.50,0.30],[0.33,0.25],[0.67,0.26],[0.17,0.18],[0.83,0.19]];
  let maxR = 0; for (const [,rf] of circles) maxR = Math.max(maxR, rf);
  const H = Math.max(8, Math.round(maxR*W) + 2);
  const cv = document.createElement('canvas'); cv.width = W; cv.height = H;
  const c2 = cv.getContext('2d');
  const baseline = H - 1;
  for (let x = 0; x < W; x++) {
    let topY = baseline + 1;                       // lowest = no coverage
    for (const [cf, rf] of circles) {
      const cx = cf*W, r = rf*W, dx = x - cx;
      if (Math.abs(dx) <= r) {
        const ty = baseline - Math.sqrt(r*r - dx*dx);
        if (ty < topY) topY = ty;
      }
    }
    topY = Math.round(topY);
    if (baseline - topY < 1) continue;             // softly rounded ends
    const th = baseline - topY;
    for (let y = topY; y <= baseline; y++) {
      const d = (y - topY) / th;                   // 0 = top, 1 = bottom
      let col;
      if (y === baseline)  col = '210,224,242';    // soft shadow at the base
      else if (d < 0.38)   col = '255,255,255';    // bright rounded top
      else if (d < 0.72)   col = '244,249,253';    // body
      else                 col = '224,234,247';    // gentle blue underside
      c2.fillStyle = `rgb(${col})`;
      c2.fillRect(x, y, 1, 1);
    }
  }
  return { cv, cx: W/2, cy: H/2 };
}

// build the static background (sky gradient + rolling hill) into an offscreen canvas
function buildBackground() {
  const w = window.innerWidth, h = window.innerHeight;
  VH = Math.round(VW * (h / w));
  canvas.width = VW; canvas.height = VH;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  ctx.imageSmoothingEnabled = false;
  imgDrawn = false;

  bg = document.createElement('canvas'); bg.width = VW; bg.height = VH;
  const b = bg.getContext('2d');
  const rng = mulberry32(20010825);

  const skyTop = [46,123,214], skyBot = [143,196,240];
  const horizon = Math.round(VH * 0.66);
  for (let y = 0; y < horizon; y++) {
    const t = y / horizon;
    b.fillStyle = `rgb(${Math.round(skyTop[0]+(skyBot[0]-skyTop[0])*t)},${Math.round(skyTop[1]+(skyBot[1]-skyTop[1])*t)},${Math.round(skyTop[2]+(skyBot[2]-skyTop[2])*t)})`;
    b.fillRect(0, y, VW, 1);
  }

  const crestY = (x) => {
    const u = x / VW;
    const hump = Math.sin(u*Math.PI*0.9 + 0.5)*0.10 + Math.sin(u*Math.PI*1.8 + 1.2)*0.03;
    return Math.round(horizon - hump*VH - 2);
  };
  const gL = [122,180,52], gM = [90,160,44], gD = [63,125,29];
  for (let x = 0; x < VW; x++) {
    const top = crestY(x);
    for (let y = top; y < VH; y++) {
      const depth = (y - top) / (VH - top);
      let c = depth < 0.12 ? gL : (depth < 0.5 ? gM : gD);
      const n = rng(); let [r,g,bb] = c;
      if (n > 0.86) { r+=10; g+=12; } else if (n < 0.10) { r-=8; g-=10; bb-=4; }
      b.fillStyle = `rgb(${r},${g},${bb})`;
      b.fillRect(x, y, 1, 1);
    }
    b.fillStyle = 'rgb(150,205,80)';
    b.fillRect(x, top, 1, 1);
  }

  sprites = CLOUDS.map(c => makeCloudSprite(c[2] * VW/200));
}

// per-frame: static bg + drifting clouds (wrapping seamlessly)
function renderClouds(offset) {
  ctx.drawImage(bg, 0, 0);
  for (let i = 0; i < CLOUDS.length; i++) {
    const [fx, fy] = CLOUDS[i];
    const s = sprites[i];
    const baseX = ((fx*VW + offset) % VW + VW) % VW;
    const y = Math.round(fy*VH - s.cy);
    for (const rep of [-VW, 0, VW]) {
      ctx.drawImage(s.cv, Math.round(baseX + rep - s.cx), y);
    }
  }
}

const DRIFT = VW * 0.015;  // virtual px / second — very gentle, ambient drift
let last = performance.now(), cloudOff = 0;
function frame(now) {
  const dt = (now - last) / 1000; last = now;
  if (hillImg) {
    if (!imgDrawn) { drawPixelImage(hillImg); imgDrawn = true; }   // photo path: static
  } else {
    cloudOff += DRIFT * dt;
    renderClouds(cloudOff);
  }
  requestAnimationFrame(frame);
}

buildBackground();
requestAnimationFrame(frame);

let rt;
window.addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(buildBackground, 120); });

// load the real Bliss photo; when ready it takes over (pixelated, static). Falls back silently.
if (CONFIG.hillImage) {
  const im = new Image();
  im.onload  = () => { hillImg = im; imgDrawn = false; };
  im.onerror = () => { console.info('[bliss] no ' + CONFIG.hillImage + ' yet — using animated drawn hill'); };
  im.src = CONFIG.hillImage;
}

</script>
</body>
</html>
